<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="960" height="560" rx="16" fill="url(#bg)"/>

  <!-- AWS Cloud boundary -->
  <rect x="40" y="60" width="880" height="460" rx="14" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="60" y="86" fill="#64748b" font-size="14" font-weight="600">AWS Cloud</text>

  <!-- VPC boundary -->
  <rect x="80" y="110" width="800" height="380" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="134" fill="#475569" font-size="13" font-weight="600">VPC (10.0.0.0/16)</text>

  <!-- Public subnets -->
  <rect x="110" y="160" width="220" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="220" y="185" fill="#1e40af" font-size="12" font-weight="700" text-anchor="middle">Public Subnets</text>
  <text x="220" y="205" fill="#1e40af" font-size="11" text-anchor="middle">ALB (internet-facing)</text>
  <text x="220" y="225" fill="#1e40af" font-size="11" text-anchor="middle">NAT Gateway</text>

  <!-- Private subnets -->
  <rect x="360" y="160" width="490" height="90" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="605" y="185" fill="#15803d" font-size="12" font-weight="700" text-anchor="middle">Private Subnets — EKS Nodes + Karpenter</text>
  <text x="605" y="210" fill="#15803d" font-size="11" text-anchor="middle">Bottlerocket managed node group (Karpenter controller)</text>
  <text x="605" y="228" fill="#15803d" font-size="11" text-anchor="middle">Karpenter-provisioned workload nodes</text>

  <!-- Intra subnets -->
  <rect x="110" y="280" width="220" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="220" y="305" fill="#92400e" font-size="12" font-weight="700" text-anchor="middle">Intra Subnets</text>
  <text x="220" y="325" fill="#92400e" font-size="11" text-anchor="middle">EKS Control Plane</text>

  <!-- EKS Control Plane -->
  <rect x="360" y="280" width="490" height="70" rx="8" fill="#ffedd5" stroke="#f97316"/>
  <text x="605" y="305" fill="#9a3412" font-size="12" font-weight="700" text-anchor="middle">EKS Control Plane (Kubernetes 1.34)</text>
  <text x="605" y="325" fill="#9a3412" font-size="11" text-anchor="middle">OIDC provider · IRSA · KMS encryption</text>

  <!-- GitOps / Runtime layer -->
  <rect x="110" y="380" width="740" height="90" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="480" y="405" fill="#5b21b6" font-size="12" font-weight="700" text-anchor="middle">GitOps Runtime (managed by Argo CD)</text>
  <text x="480" y="427" fill="#5b21b6" font-size="11" text-anchor="middle">Argo CD · Karpenter Helm · AWS LB Controller · EBS CSI · Secrets Store CSI</text>
  <text x="480" y="447" fill="#5b21b6" font-size="11" text-anchor="middle">Prometheus · Grafana · External API mTLS workloads</text>

  <!-- Arrows -->
  <line x1="330" y1="205" x2="360" y2="205" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="605" y1="250" x2="605" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="605" y1="350" x2="605" y2="380" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Terraform / Git source -->
  <rect x="110" y="30" width="160" height="36" rx="6" fill="#7c3aed"/>
  <text x="190" y="53" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Terraform (IaC)</text>
  <rect x="290" y="30" width="160" height="36" rx="6" fill="#f59e0b"/>
  <text x="370" y="53" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Git (GitOps source)</text>
  <line x1="190" y1="66" x2="190" y2="110" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="66" x2="480" y2="380" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="480" y="540" fill="#94a3b8" font-size="11" text-anchor="middle">Demo Platform — Production-Grade AWS EKS Reference Architecture</text>
</svg>
